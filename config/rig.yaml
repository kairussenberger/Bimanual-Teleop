# Physical + control configuration for the bimanual humanoid teleop rig.
#
# COORDINATE FRAME (sim/world): +x right, +y forward, +z up. The torso sits at
# `torso.pos`; each arm's YAM base is mounted at a shoulder frame relative to the
# torso. Hand mount + arm-base orientations are PLACEHOLDERS tuned for a plausible
# layout — dial `mount_euler` / `hand_euler` / `neutral_q` in the viewer to match
# your real aluminium frame (tools/frame_check.py + sim/sim_world.py --pose).

# The real rig: an AgileX Ranger 60x60 stand carrying two 5-DoF i2rt YAM arms
# (the 6th DoF is replaced by the ORCA hand mount). Geometry is from a friend's
# CAD: arm base poses ICP-registered (RMS ~1.3-1.6 mm), stand feet on the floor.
stand:
  pos: [0.0, 0.0, 0.2475]       # lifts the AgileX frame so its feet sit on z=0

arms:
  # 5-DoF YAM. base_pos/base_quat (quat = w x y z) place the arm base on the
  # stand's Y-face plates; hand_pos/hand_euler are the measured flange→ORCA-hand
  # transform; neutral_q is the home pose (j1=±90° → arms face forward, world −X).
  left:
    can_channel: can0                  # hardware (Linux): SocketCAN interface for this arm
    base_pos: [-0.0248, -0.1700, 0.6908]
    base_quat: [0.49791, 0.50194, -0.50011, -0.50004]
    hand_pos: [-0.0504, 0.1078, 0.0]   # flange (link5) → ORCA hand base
    hand_euler: [0.0, 3.14159, 0.0]    # palm-down, thumb-inward at home
    neutral_q: [1.671, -1.0, 1.825, 0.0, 0.0, 0.0]   # 6-DoF: forward + own (-Y) side, elbow bent; j6 (roll)=0
  right:
    can_channel: can1
    base_pos: [0.0101, 0.0801, 0.6875]
    base_quat: [0.49989, 0.49988, 0.50055, 0.49968]
    hand_pos: [-0.0306, 0.1078, 0.0]
    hand_euler: [0.0, 0.0, 0.0]
    neutral_q: [4.612, -1.0, 1.65, 0.0, 0.0, 0.0]   # 6-DoF: forward + own (+Y) side, elbow bent; j6 (roll)=0
  # YAM joint limits (rad). j1-j5 from the URDF; j6 (wrist roll) = i2rt YAM ±2.0944.
  joint_limits:
    lower: [0.0, -2.879793, -1.396263, -1.570796, -1.570796, -2.0944]
    upper: [6.283185, 0.436332, 2.443461, 1.570796, 1.570796, 2.0944]

hands:
  left:  { model_name: orcahand_left }
  right: { model_name: orcahand_right }

control:
  arm_hz: 120        # sim IK/control rate (real YAM CAN loop target: 200-250 on Linux)
  hand_hz: 60        # finger retarget rate
  vr_hz: 72          # expected Quest stream rate

ik:
  pos_cost: 1.0
  ori_cost: 1.0      # orientation-stage weight (stage 2 solves j4-j6 to match the hand orientation)
  posture_cost: 0.01 # gentle null-space regularization (damped-LS already avoids buckling)
  lm_damping: 1.0e-2 # damped least squares (singularity robustness)
  max_vel: 12.0      # rad/s per joint — fast tracking (sim; tune down for real hardware)
  iters: 6           # IK steps per control tick — snappier convergence, less lag
  # SOFT joint limits = home ± this margin (rad). Caps each joint near home so the
  # arm physically cannot fold into a buckle. Smaller = safer but less reach.
  soft_margin: [1.4, 1.0, 1.4, 1.4, 1.5, 1.7]   # 6 joints (j6 = wrist roll)
  solver: daqp

mapping:
  # Relative + clutch SE(3): on engage, anchor current controller & EE poses;
  # while engaged, EE target = anchor_ee ∘ scaled(relative controller motion).
  pos_scale: 1.0
  abs_orientation: true   # align EE orientation to absolute wrist orientation (OpenTeleVision style)
  # R_base_from_vr: rotation (euler xyz, rad) mapping headset/world axes -> arm base axes.
  # Mirrored about the sagittal plane for the two arms. TUNE with frame_check.
  r_base_from_vr_euler:
    left:  [0.0, 0.0, 0.0]
    right: [0.0, 0.0, 0.0]
  # Per-side abduction sign for finger spread (flip if fingers splay the wrong way).
  abd_mirror:
    left: false
    right: true

safety:
  staleness_s: 0.15   # VR sample older than this -> not fresh (hold/ramp)
  ramp_s: 0.7         # soft-start ramp from neutral on (re)engage
  hold_s: 0.3         # on VR loss while engaged: hold last, then ramp to neutral
  workspace:          # axis-aligned EE target bounds in arm base frame (m)
    min: [-0.6, -0.2, -0.6]
    max: [0.6, 0.7, 0.6]

vr:
  transport: fake     # 'fake' (synthetic, no headset) or 'vuer' (real Quest WebXR)
  calib_seconds: 5.0  # on connect: hold hands out front, palms down, spread — measures your frame
  cross_gap: 0.05     # min world-Y gap each hand keeps from center (anti-overlap guard, metres)
  cert_file: cert.pem
  key_file: key.pem
  ngrok: false        # true to tunnel for the Quest browser
