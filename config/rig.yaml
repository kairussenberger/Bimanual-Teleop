# Physical + control configuration for the bimanual humanoid teleop rig.
#
# COORDINATE FRAME (robot world): +Z up, +Y operator/robot right, and -X forward.
# This matches vr.frames.WEBXR_TO_WORLD: WebXR +x(right)->world +Y,
# +y(up)->world +Z, and -z(forward)->world -X. Each YAM base pose below is in this
# world frame; the runtime maps headset/body-relative wrist displacement into each
# arm's base frame before IK.

# The real rig: an AgileX Ranger 60x60 stand carrying two 5-DoF i2rt YAM arms
# (the 6th DoF is replaced by the ORCA hand mount). Geometry is from a friend's
# CAD: arm base poses ICP-registered (RMS ~1.3-1.6 mm), stand feet on the floor.
stand:
  pos: [0.0, 0.0, 0.2475]       # lifts the AgileX frame so its feet sit on z=0

arms:
  # 6-DoF YAM. base_pos/base_quat (quat = w x y z) place the arm base on the
  # stand's Y-face plates; hand_pos/hand_euler are the measured flange→ORCA-hand
  # transform; neutral_q is the home pose (j1=±90° → arms face forward, world −X).
  left:
    can_channel: can0                  # hardware (Linux): SocketCAN interface for this arm
    base_pos: [-0.0248, -0.1700, 1.1908]   # Kai c2814b4: +0.5m on the real elongated stand (0.69->1.19)
    base_quat: [0.49791, 0.50194, -0.50011, -0.50004]
    hand_pos: [-0.0504, 0.1078, 0.0]   # flange (link5) → ORCA hand base
    hand_euler: [0.0, 3.14159, 0.0]    # palm-down, thumb-inward at home
    neutral_q: [3.137, -0.004, 0.305, -0.162, -0.003, -1.571]   # FROZEN official rest pose — see docs/RESTING_POSE.md, DO NOT CHANGE. ragdoll hang + j6 -90° palm-inward
  right:
    can_channel: can1
    base_pos: [0.0101, 0.0801, 1.1875]   # Kai c2814b4: +0.5m on the real elongated stand (0.69->1.19)
    base_quat: [0.49989, 0.49988, 0.50055, 0.49968]
    hand_pos: [-0.0306, 0.1078, 0.0]
    hand_euler: [0.0, 0.0, 0.0]
    neutral_q: [3.14, -0.001, 0.305, -0.152, 0.001, 1.571]   # FROZEN official rest pose — see docs/RESTING_POSE.md, DO NOT CHANGE. ragdoll hang + j6 +90° palm-inward
  # YAM joint limits (rad). j1-j5 from the URDF; j6 (wrist roll) = i2rt YAM ±2.0944.
  joint_limits:
    lower: [0.0, -2.879793, -1.396263, -1.570796, -1.570796, -2.0944]
    upper: [6.283185, 0.436332, 2.443461, 1.570796, 1.570796, 2.0944]

hands:
  left:  { model_name: orcahand_left }
  right: { model_name: orcahand_right }

control:
  arm_hz: 120        # headless IK/control rate (real YAM CAN loop target: 200-250 on Linux)
  hand_hz: 60        # finger retarget rate
  vr_hz: 72          # expected Quest stream rate

ik:
  pos_cost: 1.0
  ori_cost: 1.0      # orientation-stage weight (stage 2 solves j4-j6 to match the hand orientation)
  posture_cost: 0.01 # gentle null-space regularization (damped-LS already avoids buckling)
  lm_damping: 1.0e-2 # damped least squares (singularity robustness)
  max_vel: 12.0      # rad/s per joint — fast tracking (sim; tune down for real hardware)
  iters: 6           # IK steps per control tick — snappier convergence, less lag
  # SOFT joint limits = home ± this margin (rad). Caps each joint near home so the
  # arm physically cannot fold into a buckle (the elbow floor below is the primary
  # anti-buckle guard; hard limits always apply). Sized from measured IK excursions
  # over the absolute-mapping front-of-body workspace (max |q-home| ≈
  # [2.4, 0.65, 1.4, 0.5, 1.55, 0.5]) plus headroom — the old near-rest margins
  # pinned j1/j3/j5 and made chest-height targets unreachable. Re-tighten for
  # initial hardware sessions if desired.
  soft_margin: [2.8, 1.6, 1.7, 1.4, 1.55, 1.7]   # 6 joints (j6 = wrist roll)
  # Human-plausible ELBOW (j3) floor: j3 bends both ways from its straightest (home),
  # but only +j3 is anatomical flexion; below this it swings the forearm outward into
  # the dislocated-looking "overextension". Validate with scripts/run_synthetic.py
  # and the Unity render stream before hardware sessions.
  elbow_min: 0.20
  solver: daqp

mapping:
  # Position: 'absolute' maps your torso→wrist vector 1:1 (×pos_scale) onto the
  # robot's chest→wrist vector — hands held in front of YOU put the robot's hands
  # in front of IT. On (re)engage the arm GLIDES onto that correspondence over
  # engage_blend_s (snap-free); displacements map 1:1 from the first instant.
  # 'relative' = legacy clutch deltas about the engage anchor.
  # Orientation always uses the SAME body→world axis map (calibration-free):
  # rotate your hand about a body axis and the EE rotates about the matching world axis.
  position_mode: absolute
  body_anchor_world: null   # robot chest point (world); null = midpoint of the arm bases, dropped by body_anchor_drop
  body_anchor_drop: 0.15    # m below the base plates (shoulder line) for the default chest anchor
  engage_blend_s: 1.0       # seconds to glide from the current EE onto the absolute target
  # Orientation: 'absolute' = the robot hand WEARS your hand's attitude (mapped
  # through the body↔world axes + a derived hand↔EE convention), gliding on
  # (re)engage like position — the dashboard overlay skeleton and the ORCA hand
  # coincide by construction. 'relative' = clutch-latched deltas (then twist_mode
  # below applies).
  orientation_mode: absolute
  # Hand-local axes, PER SIDE — the two hands are mirrored anatomically (x flips
  # sign) and the old single shared constants were measured once on a desk and
  # sat 21° (fingers) / 45° (palm) off, mis-mapping every commanded attitude
  # (rolls leaked into j4/j5 swing). Re-measured 2026-06-11 from THREE real
  # sessions: 14.7k tracked frames, 4-5° scatter, left/right agree as mirrors.
  hand_finger_axis:                          # hand-local fingers direction
    left:  [-0.023, -0.225, -0.974]
    right: [0.024, -0.237, -0.971]
  hand_palm_axis:                            # hand-local back-of-hand normal
    left:  [-0.171, 0.961, -0.217]
    right: [0.175, 0.958, -0.229]
  # Wrist twist (RELATIVE orientation mode only): 'intrinsic' = pronation about
  # YOUR forearm axis is a pure j6 roll about the EE's own tool axis (no j4/j5
  # singularity contortion); 'world' = fully extrinsic (diagnostics).
  twist_mode: intrinsic
  # Forearm/roll axis in the ORBIT hand frame, PER SIDE (mirror pair, like the
  # finger/palm axes above). Measured from fast-rotation samples across the
  # same sessions; the old shared [0, 0.456, 0.890] was ~10° off.
  hand_twist_axis:
    left:  [0.10, 0.32, 0.94]
    right: [-0.02, 0.30, 0.95]
  pos_scale: 1.0
  # Operator NEUTRAL-POSE calibration (position-only; orientation is calibration-
  # free by contract). robot_neutral_wrist = where each wrist should sit, in body
  # coords [right, up, forward] (m) relative to the chest anchor, when the operator
  # holds the calibration pose (both arms extended straight forward at shoulder
  # height). Probed 2026-06-11 with the real IK: comfortable max forward reach is
  # ~0.52 m at lateral ±0.22 — neutral is set at ~90% of that, so the operator's
  # full natural extension maps to near-full robot extension.
  robot_neutral_wrist:
    left:  [-0.22, 0.02, 0.46]
    right: [0.22, 0.02, 0.46]
  # The robot's REST pose wrists in the same body coords (FK of neutral_q vs the
  # chest anchor) — pose B of the TWO-POSE calibration (arms relaxed at the
  # sides). Scales come from pose-A−pose-B DIFFERENCES, so the ORBIT recenter
  # anchor (which shifts all hand positions by an arbitrary vector — measured
  # 0.5 m after a desk-start) cancels exactly.
  robot_rest_wrist:
    left:  [-0.221, -0.437, -0.032]
    right: [0.222, -0.440, 0.032]
  # Pose C of the calibration (palms pressed together in front of the chest)
  # anchors the LATERAL map at contact width: the operator's measured clap gap
  # maps to this commanded wrist separation — sized so the capsule guard
  # (safety.hand_min_separation) leaves the rendered palms just touching.
  robot_clap_gap: 0.12
  # Where the fitted scale/offset is persisted (per-machine, gitignored — like
  # config/viz_calib.json). Auto-loaded on engine start for LIVE transports only
  # (orbit/vuer); fake/replay stay identity so the acceptance gate and the session
  # scorer stay deterministic.
  calib_file: config/operator_calib.json
  # Legacy manual mapper trim (euler xyz, rad). In body_relative mode the runtime
  # installs the measured body->base mapping at calibration time; leave these at zero
  # unless you explicitly disable body_relative for diagnostics.
  r_base_from_vr_euler:
    left:  [0.0, 0.0, 0.0]
    right: [0.0, 0.0, 0.0]
  # Per-side abduction sign for finger spread (flip if fingers splay the wrong way).
  abd_mirror:
    left: false
    right: true

safety:
  staleness_s: 0.15   # VR sample older than this -> not fresh (hold/ramp)
  hold_s: 0.3         # on VR loss while engaged: hold last, then ramp to neutral
  # Pairwise hand guard: each hand is a CAPSULE from the wrist hand_capsule_len
  # metres toward the fingertips; the minimum distance between the two capsules
  # (or vs a parked arm's capsule) is kept ≥ hand_min_separation by pushing the
  # wrist targets apart along the closest-point line. Clapping brings the hands
  # to CONTACT distance — palms, fingers, or fingertips-to-palm — never through.
  hand_min_separation: 0.12
  hand_capsule_len: 0.19
  # Motion guardrails (sim AND the gateway to hardware):
  # - target_speed_max / target_ang_speed_max cap how fast the commanded EE
  #   target may translate/rotate (operator p99 measured ≈2 m/s).
  # - target_jump_speed: implied speeds above this are NOT movements (tracking
  #   glitches measured 58–65 m/s) — the mapper re-anchors and the arm GLIDES;
  #   the violent motion simply never happens.
  # - sim_rate_limit / sim_smooth_hz: the hardware-style joint command shaper now
  #   ALSO runs in the sim/render path — published joints can never move faster
  #   than this, whatever the IK does (singularity flips leave as bounded
  #   glides). Set sim_rate_limit to hardware.rate_limit (1.2) for exact
  #   real-robot motion parity before a hardware day.
  target_speed_max: 0.8
  target_jump_speed: 3.0
  target_ang_speed_max: 2.5
  # Mid-session ANCHOR-JUMP guard (safety/anchor_guard.py): a recenter, app
  # restart, or headset sleep moves the ORBIT stream anchors and silently
  # invalidates the applied calibration — the guard watches the body-relative
  # wrist signal for coherent discontinuities and a dead stream, locks follow,
  # and demands a recalibration. Thresholds sized from 19 real sessions
  # (2026-06-11): normal per-frame deltas p99 < 3 cm; one-frame tracking
  # glitches of 0.2–1.5 m are common (absorbed by confirm_frames + the
  # other-hand cross-check); benign stream hiccups measured ≤ 0.9 s.
  anchor_guard:
    enabled: true
    jump_m: 0.25            # one-sample discontinuity beyond this + speed_allow*dt = suspect
    speed_allow: 4.0        # m/s honest-motion allowance (scales with the sample gap)
    confirm_frames: 3       # consecutive far samples to confirm (~27 ms at 110 Hz)
    return_tol: 0.10        # m — snap back within this of pre-jump = glitch, resume
    coherence_tol: 0.15     # m — both-side jump similarity = shared-anchor event
    max_sample_gap_s: 0.3   # continuity expires across longer per-side gaps (dropout)
    blackout_s: 2.0         # live transports: whole stream dead this long → trip
  # Attitude low-pass time constant (s): raw Quest wrist quats carry ~200°/s of
  # high-frequency jitter (worse when the palm rotates away from the cameras);
  # the commanded attitude slerps toward the demand with this τ. 0 disables.
  target_ori_smooth_s: 0.12
  sim_rate_limit: 1.8
  sim_smooth_hz: 4.0
  workspace:          # axis-aligned EE target bounds in arm base frame (m)
    min: [-0.6, -0.85, -0.6]   # y-min lowered: arms-down home wrist sits at base-y≈-0.56;
    max: [0.6, 0.7, 0.6]       # old -0.2 clipped it +0.36m on engage -> arms curled to center

# Hardware-boundary safety (run_hw / HardwareSink). These act ON TOP of the IK
# velocity limits and joint hardstops — the shaper is the last line of defense:
# every CAN command is limit-clamped, speed-capped, and PD-smoothed, gliding from
# the arm's MEASURED pose at startup (this supersedes the old ramp_s soft-start).
hardware:
  max_vel_scale: 0.35 # derate ik.max_vel for real motors (sim keeps full speed)
  rate_limit: 1.2     # rad/s hard per-joint speed cap at the CAN boundary
  smooth_hz: 3.0      # critically-damped command tracker bandwidth (the "PD" feel)

vr:
  transport: fake     # 'fake' (synthetic, no headset) or 'vuer' (real Quest WebXR)
  render_endpoint: tcp://127.0.0.1:8101       # ZMQ/msgpack render.state stream
  unity_json_endpoint: tcp://127.0.0.1:8102   # plain TCP newline JSON for Unity
  body_relative: true # arm IK sees wrist relative to current head/body frame, not raw XR-world hand position
  torso_from_head: [0.0, -0.35, 0.0] # body-frame torso proxy from headset: right, up, forward (m)
  calib_seconds: 0.0  # arm mapping is calibration-free; >0 re-enables the optional legacy startup stillness hold (only steers arms when body_relative is false)
  cross_gap: 0.05     # min world-Y gap each hand keeps from center (anti-overlap guard, metres)
  control_port: 8201  # localhost TCP line-JSON engine commands (dashboard CALIBRATE button)
  # SAFETY: the operator's body frame yaw. 'locked' (default) = the forward
  # direction is LATCHED (from the calibration's arm-defined forward; before
  # that, from the first head sample) — looking left/right or taking the
  # headset off can NEVER move the arms (head position already cancels in the
  # body-relative subtraction; this removes head ROTATION too). 'head' = legacy
  # live head yaw (only sane for true-world sources like Vuer).
  body_yaw: locked
  # SAFETY: live transports (orbit/vuer) hold the arms at rest and ignore all
  # hand input until the operator completes the guided calibration IN THIS
  # SESSION — a fresh ORBIT recenter anchor makes any previous session's
  # absolute mapping untrustworthy. fake/replay are exempt (deterministic
  # tests/analysis). Set false to restore follow-on-startup.
  require_calibration: true
  # ORBIT streams the head floor-anchored but the wrists in a RECENTER-anchored
  # frame (and a recenter/desk-start moves that anchor arbitrarily — measured
  # +0.5 m once, breaking calibration). 'keypoint' rebuilds each wrist as
  # head_pos + hand keypoint[0] (keypoints are head-anchored, world axes) —
  # NO anchor assumption, recenter-proof. 'head' = legacy live-head re-anchor;
  # 'world' = raw passthrough.
  orbit_wrist_anchor: keypoint
  cert_file: cert.pem
  key_file: key.pem
  ngrok: false        # true to tunnel for the Quest browser
